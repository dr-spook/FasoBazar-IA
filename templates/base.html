<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>{% block title %}FasoBazar IA{% endblock %}</title>

  <!-- ═══ PWA Meta Tags ═══════════════════════════════════════ -->
  <meta name="description" content="Comptabilité vocale pour commerçantes — IA en Mooré, Dioula, Français">
  <meta name="theme-color" content="#059669">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="FasoBazar IA">

  <!-- Apple PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="FasoBazar">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/static/icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/static/icons/icon-192x192.png">

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
  <link rel="shortcut icon" href="/static/icons/favicon-32x32.png">

  <!-- Manifest PWA -->
  <link rel="manifest" href="/static/pwa/manifest.json">

  <!-- Open Graph (partage sur réseaux sociaux) -->
  <meta property="og:title" content="FasoBazar IA">
  <meta property="og:description" content="La comptabilité vocale qui donne accès au crédit aux femmes commerçantes du Burkina Faso">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/static/icons/icon-512x512.png">

  <!-- ═══ CSS ══════════════════════════════════════════════════ -->
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Google Fonts : Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ── Tokens de design FasoBazar ── */
    :root {
      --fb-primary:       #059669;   /* emerald-600 */
      --fb-primary-dark:  #047857;   /* emerald-700 */
      --fb-primary-light: #D1FAE5;   /* emerald-100 */
      --fb-amber:         #F59E0B;   /* amber-500 */
      --fb-amber-light:   #FEF3C7;
      --fb-surface:       #FAFAF9;   /* stone-50 */
      --fb-card:          #FFFFFF;
      --fb-stone-100:     #F5F5F4;
      --fb-stone-200:     #E7E5E4;
      --fb-stone-400:     #A8A29E;
      --fb-stone-600:     #57534E;
      --fb-stone-900:     #1C1917;
      --fb-shadow-sm:     0 1px 3px rgba(0,0,0,.08);
      --fb-shadow-vocal:  0 10px 25px -5px rgba(5,150,105,.35);
      --fb-radius:        16px;
      --fb-radius-sm:     12px;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--fb-surface);
      color: var(--fb-stone-900);
      -webkit-tap-highlight-color: transparent;
    }

    /* ── App shell mobile ── */
    .app-shell {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── Header ── */
    .app-header {
      height: 56px;
      background: var(--fb-surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
      border-bottom: 1px solid transparent;
    }

    /* Zone secrète Mode Oz — logo FasoBazar */
    .logo-trigger {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      padding: 8px 4px;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
      min-width: 44px; min-height: 44px;
    }
    .logo-square {
      width: 28px; height: 28px;
      background: var(--fb-primary);
      border-radius: 8px;
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 18px;
      font-weight: 700;
      color: var(--fb-stone-900);
    }
    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--fb-primary-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      color: #065F46;
    }

    /* ── Main content ── */
    .app-main {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 88px;
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: 64px;
      background: #fff;
      border-top: 1px solid var(--fb-stone-200);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 100;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 2px; flex: 1;
      text-decoration: none;
      color: var(--fb-stone-400);
      font-size: 11px; font-weight: 500;
      min-height: 44px; justify-content: center;
      transition: color .15s;
    }
    .nav-item.active, .nav-item:hover { color: var(--fb-primary); }
    .nav-item i { font-size: 20px; }

    /* ── Cards ── */
    .fb-card {
      background: var(--fb-card);
      border-radius: var(--fb-radius);
      box-shadow: var(--fb-shadow-sm);
      padding: 16px;
    }

    /* ── Bouton vocal ── */
    .vocal-btn {
      width: 96px; height: 96px;
      border-radius: 50%;
      border: none;
      background: var(--fb-primary);
      color: white;
      font-size: 36px;
      cursor: pointer;
      box-shadow: var(--fb-shadow-vocal);
      transition: all .15s ease-out;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      touch-action: manipulation;
    }
    .vocal-btn:hover   { background: var(--fb-primary-dark); }
    .vocal-btn:active  { transform: scale(.95); }
    .vocal-btn.recording {
      background: #DC2626;
      box-shadow: 0 0 0 8px rgba(220,38,38,.15);
      animation: pulse-ring 1s ease-out infinite;
    }
    .vocal-btn.processing {
      background: #D6D3D1;
      cursor: wait;
    }
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(220,38,38,.4); }
      70%  { box-shadow: 0 0 0 12px rgba(220,38,38,0); }
      100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
    }

    /* ── Transaction card ── */
    .tx-card {
      background: var(--fb-card);
      border-radius: var(--fb-radius);
      box-shadow: var(--fb-shadow-sm);
      padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
      animation: slideDown .2s ease-out;
    }
    @keyframes slideDown {
      from { transform: translateY(-8px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .tx-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .tx-icon.vente { background: var(--fb-primary-light); color: var(--fb-primary); }
    .tx-icon.achat { background: var(--fb-amber-light);   color: #B45309; }
    .tx-product { font-size: 15px; font-weight: 600; color: var(--fb-stone-900); }
    .tx-time    { font-size: 12px; color: var(--fb-stone-400); }
    .tx-amount  { font-size: 15px; font-weight: 700; margin-left: auto; white-space: nowrap; }
    .tx-amount.vente { color: var(--fb-primary); }
    .tx-amount.achat { color: #B45309; }
    .tx-fcfa    { font-size: 11px; font-weight: 400; color: var(--fb-stone-400); margin-left: 2px; }

    /* ── Bilan summary ── */
    .summary-col { text-align: center; }
    .summary-val { font-size: 18px; font-weight: 700; }
    .summary-lbl { font-size: 11px; color: var(--fb-stone-400); margin-top: 2px; }
    .summary-val.ventes  { color: var(--fb-primary); }
    .summary-val.achats  { color: #B45309; }
    .summary-val.benefice{ color: var(--fb-stone-900); }

    /* ── Score gauge (SVG arc) ── */
    .score-number { font-size: 40px; font-weight: 700; }
    .score-green  { color: var(--fb-primary); }
    .score-amber  { color: var(--fb-amber); }
    .score-grey   { color: var(--fb-stone-400); }

    /* ── Badge statut ── */
    .badge-construction { background: #F5F5F4; color: var(--fb-stone-600); }
    .badge-eligible     { background: var(--fb-primary-light); color: #065F46; }
    .badge-confirme     { background: var(--fb-primary); color: white; }

    /* ── Toast ── */
    .toast-container { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 200; width: calc(100% - 32px); max-width: 390px; }

    /* ── Skeleton loader ── */
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes shimmer { 0% { background-position: 200%; } 100% { background-position: -200%; } }

    /* ── Desktop centré ── */
    @media (min-width: 500px) {
      .app-shell { box-shadow: 0 0 40px rgba(0,0,0,.08); }
    }

    /* ── Dashboard IMF — layout full-width ── */
    .imf-layout {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px;
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ════════════════════════════════════════════════
// MODE OZ — Triple-clic sur le logo (3 secondes)
// Invisible pour le jury
// ════════════════════════════════════════════════
(function() {
  let ozActive = false;
  let pressTimer = null;

  const trigger = document.getElementById('oz-trigger');
  if (!trigger) return;

  function activateOz() {
    ozActive = !ozActive;
    window._OZ_MODE = ozActive;
    // Vibration haptique discrète (mobile)
    if (navigator.vibrate) navigator.vibrate(80);
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
      console.log('[OZ MODE]', ozActive ? 'ACTIVÉ' : 'DÉSACTIVÉ');
    }
  }

  trigger.addEventListener('pointerdown', () => {
    pressTimer = setTimeout(activateOz, 3000);
  });
  trigger.addEventListener('pointerup',   () => clearTimeout(pressTimer));
  trigger.addEventListener('pointerleave',() => clearTimeout(pressTimer));
  trigger.addEventListener('contextmenu', e => e.preventDefault());
})();

// ════════════════════════════════════════════════
// TOAST helper
// ════════════════════════════════════════════════
function showToast(message, type = 'success') {
  const colors = {
    success: '#059669', achat: '#F59E0B', error: '#DC2626', info: '#0284C7'
  };
  const icons = {
    success: 'check-circle', achat: 'check-circle', error: 'exclamation-circle', info: 'info-circle'
  };
  const container = document.getElementById('toast-container');
  if (!container) return;

  const id = 'toast-' + Date.now();
  const div = document.createElement('div');
  div.id = id;
  div.style.cssText = `
    background:${colors[type]||colors.success};
    color:white;
    border-radius:16px;
    padding:14px 16px;
    display:flex;
    align-items:center;
    gap:10px;
    box-shadow:0 8px 24px rgba(0,0,0,.15);
    font-weight:500;
    font-size:14px;
    margin-bottom:8px;
    animation: toastIn .25s ease-out;
  `;
  div.innerHTML = `<i class="bi bi-${icons[type]||icons.success}" style="font-size:18px;flex-shrink:0"></i><span>${message}</span>`;
  container.prepend(div);

  setTimeout(() => { div.style.opacity = '0'; div.style.transition = 'opacity .2s'; }, 2800);
  setTimeout(() => div.remove(), 3100);
}
</script>

<style>
@keyframes toastIn {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
</style>

{% block extra_js %}{% endblock %}

<!-- ═══ PWA — Service Worker + Install Banner ═══════════════ -->
<script>
// ── Enregistrement du Service Worker ────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/static/pwa/sw.js', { scope: '/' })
      .then(reg => {
        console.log('[PWA] Service Worker enregistré:', reg.scope);
      })
      .catch(err => {
        console.log('[PWA] Erreur SW:', err);
      });
  });
}

// ── Bannière d'installation PWA ─────────────────────────────
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;

  // Afficher le bouton d'installation si présent sur la page
  const installBtn = document.getElementById('pwa-install-btn');
  if (installBtn) {
    installBtn.style.display = 'flex';
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        installBtn.style.display = 'none';
        showToast('FasoBazar IA installée sur ton téléphone !', 'success');
      }
      deferredPrompt = null;
    });
  }
});

window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  showToast('FasoBazar IA installée avec succès !', 'success');
});
</script>

</body>
</html>
